name: Collect Churches
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Crawler
        run: python crawler/collect_data.py
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: church-base
          path: "**/*.json" # Робот сам найдет любой JSON файл в любой папке
