name: Collect Churches
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install requests
      - name: Run Crawler
        run: python crawler/collect_data.py
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: church-base
          # Этот путь заставит робота обыскать ВСЕ папки на наличие JSON
          path: "**/*.json" 
